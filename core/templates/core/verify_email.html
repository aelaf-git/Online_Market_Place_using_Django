{% extends 'core/base.html' %}

{% block title %}Verify Email | MarketPlace{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md space-y-8 bg-black border border-zinc-800 p-8 rounded-2xl shadow-2xl">
        <div class="text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-[#1D9BF0]/10 text-[#1D9BF0] mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold text-white tracking-tight">Verify your email</h2>
            <p class="mt-3 text-zinc-400">
                We've sent an 8-digit code to <span class="text-white font-medium">{{ email }}</span>.
                The code expires in 5 minutes.
            </p>
        </div>

        <form method="post" class="mt-8 space-y-6">
            {% csrf_token %}
            <div>
                <label for="code" class="sr-only">Verification Code</label>
                <input id="code" name="code" type="text" maxlength="8" required 
                       class="w-full px-5 py-4 bg-black border border-zinc-800 rounded-xl text-white text-center text-3xl tracking-[0.5em] font-mono placeholder-zinc-700 focus:outline-none focus:border-[#1D9BF0] focus:ring-1 focus:ring-[#1D9BF0] transition-all duration-200"
                       placeholder="00000000">
            </div>

            <button type="submit" 
                    class="w-full py-4 bg-white text-black font-bold rounded-full hover:bg-zinc-200 transition-colors duration-200 transform active:scale-[0.98]">
                Verify Account
            </button>
        </form>

        <div class="text-center pt-4 border-t border-zinc-900">
            <p class="text-zinc-500 text-sm">
                Didn't receive the code? 
                <a href="{% url 'core:resend_code' %}" class="text-[#1D9BF0] hover:underline font-medium ml-1">Resend Code</a>
            </p>
            <p class="mt-4">
                <a href="{% url 'core:signup' %}" class="text-zinc-500 hover:text-white text-sm transition-colors">
                    Back to Signup
                </a>
            </p>
        </div>
    </div>
</div>

<script>
    // Simple auto-focus and formatting for the code input
    const codeInput = document.getElementById('code');
    codeInput.focus();
    
    codeInput.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
    });
</script>
{% endblock %}
