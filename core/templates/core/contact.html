{% extends 'core/base.html' %}

{% block title %}Online Market Place{% endblock %}

{% block content %}
    <div class="max-w-2xl mx-auto my-16 p-12 bg-slate-900/50 backdrop-blur-xl border border-cyan-900/50 rounded-[2rem] shadow-[0_0_50px_rgba(0,0,0,0.6)] relative overflow-hidden group hover:border-cyan-500/50 transition-colors duration-500">
        <div class="absolute inset-x-0 -top-px h-px bg-gradient-to-r from-transparent via-cyan-500/80 to-transparent"></div>

        <div class="flex justify-center">

{% endblock %}
