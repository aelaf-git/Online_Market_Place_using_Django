{% extends 'core/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-2xl my-16 mx-auto p-10 bg-black border border-zinc-800 rounded-3xl shadow-2xl relative">
    <h1 class="text-3xl font-black text-white mb-8 text-center tracking-tight">{{ title }}</h1>

    <form method="post" action="." enctype="multipart/form-data">
        {% csrf_token %}
        <div class="space-y-8">
            <div class="text-white font-medium"> <!-- Apply styling context to form fields -->
                {{ form.as_p }}
            </div>
        </div>

        {% if form.errors or form.non_field_errors %}
            <div class="mt-8 mb-6 p-4 bg-red-950/20 border border-red-900/50 text-red-500 rounded-xl">
                {% for field in form %}
                    {{ field.errors }}
                {% endfor %}
                {{ form.non_field_errors }}
            </div>
        {% endif %}  
        <button class="w-full mt-10 py-4 px-8 text-lg font-black bg-white text-black rounded-full hover:bg-zinc-200 transition-all duration-200 active:scale-95 shadow-xl" type="submit">Publish Listing</button>
    </form>
</div>
{% endblock %}
