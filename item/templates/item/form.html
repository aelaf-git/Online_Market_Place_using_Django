{% extends 'core/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="max-w-2xl my-12 mx-auto p-10 bg-slate-900/50 backdrop-blur-xl border border-cyan-900/50 rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.6)] relative overflow-hidden">
    <div class="absolute inset-x-0 -top-px h-px bg-gradient-to-r from-transparent via-cyan-500/50 to-transparent"></div>
    <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-500 mb-8 text-center drop-shadow-[0_0_10px_rgba(6,182,212,0.6)] tracking-widest uppercase">{{ title }}</h1>

    <form method="post" action="." enctype="multipart/form-data">
        {% csrf_token %}
        <div class="space-y-6">
            <div class="text-slate-300 font-medium"> <!-- Apply styling context to form fields if rendered plainly -->
                {{ form.as_p }}
            </div>
        </div>

        {% if form.errors or form.non_field_errors %}
            <div class="mt-6 mb-6 p-4 bg-red-900/40 border border-red-500/50 text-red-200 rounded-xl shadow-[0_0_15px_rgba(239,68,68,0.2)] backdrop-blur-sm">
                {% for field in form %}
                    {{ field.errors }}
                {% endfor %}

                {{ form.non_field_errors }}
            </div>
        {% endif %}  
        <button class="w-full mt-8 py-4 px-8 text-lg font-bold tracking-widest uppercase bg-cyan-500 text-slate-950 rounded-xl hover:bg-cyan-400 shadow-[0_0_15px_rgba(6,182,212,0.4)] hover:shadow-[0_0_25px_rgba(6,182,212,0.8)] transition-all duration-300" type="submit">Submit</button>
    </form>
</div>
{% endblock %}
