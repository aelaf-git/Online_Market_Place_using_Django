{% extends 'core/base.html' %}

{% block title %}Sign up{% endblock %}

{% block content %}
<div class="w-1/2 my-6 mx-auto bg-gray-100 rounded-xl" >
    <h1 class="w-1/2 my-6 mx-auto p-6 bg-gray-100 rounded-xl">Sign up</h1>
    <form method="post" action=".">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="py-4 px-8 text-lg bg-teal-500 hover:bg-teal-700 rounded-xl text-white"type="submit">Sign up</button>
    </form>
</div>   

{% endblock %}
