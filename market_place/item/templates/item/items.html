{% extends 'core/base.html' %}

{% block title %}Items{% endblock %}

{% block content %}
    <div class="pb-6 grid grid-cols-4 gap-4 bg-gray-100">
        <div class="col-span-1">
            <form method="get" action="{% url 'item:items' %}">
                <input class="w-full py-6 px-6 border rounded" type="text" name="query" placeholder="Search items..." value="{{ query }}">
                <button class="mt-2 py-4 px-8 text-lg bg-teal-500 text-white rounded-xl" type="submit">Search</button>
            </form>
        </div>
        <div class="col-span-3">
            <div class="grid grid-cols-3 gap-3">
    {% for item in items %}
    <div>
      <a href="{% url 'item:detail' item.pk %}">
        <div>
          {% if item.image %}
          <img
            src="{{ item.image.url }}"
            alt="{{ item.name }}"
            class="w-full h-48 object-cover rounded-lg"
          />
          {% else %}
          <div
            class="w-full h-48 bg-gray-200 flex items-center justify-center rounded-lg"
          >
            <span class="text-gray-500">No image</span>
          </div>
          {% endif %}
        </div>
        <div class="p-6 bg-white rounded-b-xl">
          <h3 class="text-lg font-semibold mt-2">{{ item.name }}</h3>
          <p class="text-gray-500 mt-1">${{ item.price }}</p>
        </div>
      </a>
    </div>
    {% endfor %}
  </div>
        </div>
    </div>
{% endblock %}
